<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DJ Requests</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090b10;
    --surface: #111420;
    --surface2: #181c2a;
    --border: rgba(255,255,255,0.07);
    --border-bright: rgba(255,255,255,0.14);
    --accent: #c6ff00;
    --accent-dim: rgba(198,255,0,0.12);
    --accent-glow: rgba(198,255,0,0.35);
    --pink: #ff3e7f;
    --pink-dim: rgba(255,62,127,0.12);
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.45);
    --font-display: 'Bebas Neue', Impact, sans-serif;
    --font-mono: 'DM Mono', 'Courier New', monospace;
    --font-body: 'DM Sans', system-ui, sans-serif;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── noise overlay ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' result='noise'/%3E%3CfeDisplacementMap in='SourceGraphic' in2='noise' scale='15' xChannelSelector='R' yChannelSelector='G'/%3E%3C/filter%3E%3Crect width='200' height='200' fill='%23090b10' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 0;
  }

  .hidden { display: none !important; }

  /* ─── PANELS ─── */
  .panel {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ─── HEADER STRIP ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 0;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 22px;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 2.4rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--pink); }

  .badge {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border-bright);
    padding: 5px 10px;
    border-radius: 100px;
  }

  /* ─── SECTION LABEL ─── */
  .section-label {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  /* ─── INPUTS ─── */
  .input-group {
    position: relative;
    margin-bottom: 14px;
  }

  .input-group label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .input-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
    opacity: 0.3;
    pointer-events: none;
  }

  input[type="text"], textarea.text-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1.25rem;
    font-weight: 500;
    padding: 20px 22px 20px 52px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  textarea.text-input {
    resize: none;
    height: 90px;
    line-height: 1.5;
    padding-top: 16px;
    padding-bottom: 16px;
  }

  input[type="text"].active-field, textarea.text-input.active-field {
    border-color: var(--accent);
    background: var(--surface2);
    box-shadow: 0 0 0 3px var(--accent-dim), 0 0 20px var(--accent-glow);
  }

  input[type="text"]::placeholder, textarea.text-input::placeholder { color: var(--muted); font-weight: 400; }

  /* ─── SUBMIT BUTTON ─── */
  .btn-submit {
    width: 100%;
    margin-top: 6px;
    margin-bottom: 30px;
    padding: 22px;
    background: var(--accent);
    color: #0a0a0f;
    font-family: var(--font-display);
    font-size: 1.7rem;
    letter-spacing: 0.08em;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    box-shadow: 0 0 30px var(--accent-glow);
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover {
    box-shadow: 0 0 50px rgba(198,255,0,0.55);
    transform: translateY(-1px);
  }

  .btn-submit:active { transform: scale(0.98); }

  .btn-submit::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn-submit:hover::after { opacity: 1; }

  /* ─── KEYBOARD ─── */
  .keyboard-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
  }

  .kb-field-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .kb-toggle {
    flex: 1;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .kb-toggle.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  .keyboard {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 8px;
  }

  .key {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-bottom: 3px solid rgba(0,0,0,0.4);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 1.05rem;
    font-weight: 500;
    padding: 18px 0;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: background 0.08s, transform 0.06s, border-color 0.08s;
    -webkit-tap-highlight-color: transparent;
  }

  .key:active, .key.pressed {
    background: var(--surface);
    transform: translateY(2px);
    border-bottom-width: 1px;
    border-color: var(--accent);
    color: var(--accent);
  }

  .key.span-2 { grid-column: span 2; }
  .key.span-3 { grid-column: span 3; }
  .key.span-4 { grid-column: span 4; }
  .key.span-5 { grid-column: span 5; }
  .key.span-6 { grid-column: span 6; }
  .key.span-10 { grid-column: span 10; }

  .key.mod {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .key.special {
    background: rgba(198,255,0,0.07);
    border-color: rgba(198,255,0,0.2);
    color: var(--accent);
  }

  /* ─── THANK YOU ─── */
  #thankYou {
    position: fixed;
    inset: 0;
    background: rgba(9,11,16,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 100;
    backdrop-filter: blur(6px);
  }

  #thankYou.show { opacity: 1; }

  #thankYou .ty-icon {
    font-size: 4rem;
    line-height: 1;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  #thankYou .ty-text {
    font-family: var(--font-display);
    font-size: 3.2rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    animation: popIn 0.4s 0.06s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  #thankYou .ty-sub {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    animation: popIn 0.4s 0.12s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ─── DJ VIEW ─── */
  .dj-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
  }

  .stat-card .val {
    font-family: var(--font-display);
    font-size: 2.6rem;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .stat-card .lbl {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ─── REQUEST CARD ─── */
  .request {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 14px;
    transition: border-color 0.2s, background 0.2s, opacity 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }

  .request::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 3px 0 0 3px;
    transition: background 0.2s;
  }

  .request.rejecting {
    opacity: 0;
    transform: translateX(40px);
    pointer-events: none;
  }

  .request.played {
    border-color: rgba(198,255,0,0.25);
    background: rgba(198,255,0,0.04);
  }

  .request.rejected {
    border-color: rgba(255,62,127,0.25);
    background: rgba(255,62,127,0.04);
  }

  .request.rejected::before { background: var(--pink); }

  .request-num {
    position: absolute;
    top: 18px;
    right: 20px;
    font-family: var(--font-display);
    font-size: 4rem;
    color: rgba(255,255,255,0.04);
    line-height: 1;
    pointer-events: none;
    letter-spacing: 0;
  }

  .song-name {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: 0.04em;
    line-height: 1.1;
    margin-bottom: 6px;
    padding-right: 60px;
  }

  .req-meta {
    font-family: var(--font-mono);
    font-size: 1rem;
    letter-spacing: 0.06em;
    color: var(--pink);
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 4px;
  }

  .req-meta .sep { opacity: 0.3; }

  .dj-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .btn-played, .btn-reject {
    flex: 1;
    padding: 13px 20px;
    border: 1px solid;
    border-radius: var(--radius-sm);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-played {
    background: var(--accent-dim);
    border-color: rgba(198,255,0,0.3);
    color: var(--accent);
  }

  .btn-played:hover {
    background: var(--accent);
    color: #0a0a0f;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .btn-reject {
    background: var(--pink-dim);
    border-color: rgba(255,62,127,0.3);
    color: var(--pink);
  }

  .btn-reject:hover {
    background: var(--pink);
    color: #fff;
  }

  .req-note {
    font-family: var(--font-body);
    font-size: 1rem;
    color: var(--pink);
    background: rgba(255,62,127,0.08);
    border-left: 3px solid var(--pink);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-top: 10px;
    font-style: italic;
    font-weight: 500;
  }


  .dj-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-clear:hover { border-color: var(--pink); color: var(--pink); }

  .btn-sort {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border-bright);
    background: var(--surface2);
    color: var(--muted);
  }

  .btn-sort:hover { border-color: var(--text); color: var(--text); }
  .btn-sort.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .btn-export {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid rgba(198,255,0,0.3);
    background: rgba(198,255,0,0.06);
    color: var(--accent);
  }

  .btn-export:hover { background: rgba(198,255,0,0.15); border-color: var(--accent); }

  /* ─── DJ BOOTH COUNTDOWN BANNER ─── */
  #djCountdownBanner {
    display: none;
    background: linear-gradient(135deg, rgba(198,255,0,0.07), rgba(126,184,255,0.07));
    border: 1px solid rgba(198,255,0,0.2);
    border-radius: var(--radius);
    padding: 14px 20px;
    margin-bottom: 20px;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  #djCountdownBanner.visible { display: flex; }

  .dj-cd-left .dj-cd-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .dj-cd-left .dj-cd-date {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: #7eb8ff;
  }

  .dj-cd-timer {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .dj-cd-unit {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    min-width: 52px;
  }

  .dj-cd-num {
    font-family: var(--font-display);
    font-size: 1.6rem;
    letter-spacing: 0.02em;
    color: var(--accent);
    line-height: 1;
    display: block;
  }

  .dj-cd-unit-label {
    font-family: var(--font-mono);
    font-size: 0.5rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
    display: block;
  }

  .dj-cd-sep {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--muted);
    opacity: 0.35;
    padding-bottom: 10px;
    align-self: flex-end;
  }

  /* ─── COPY BUTTON (DJ cards) ─── */
  .btn-copy {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    border: 2px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    z-index: 2;
    flex-shrink: 0;
  }

  .btn-copy:hover {
    background: var(--accent);
    color: #0a0a0f;
    box-shadow: 0 0 16px var(--accent-glow);
    transform: scale(1.08);
  }

  .btn-copy:active { transform: scale(0.93); }

  .btn-copy.copied {
    background: var(--accent);
    color: #0a0a0f;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* ─── LOCK BUTTON ─── */
  .btn-lock {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(255,62,127,0.4);
    background: rgba(255,62,127,0.08);
    color: var(--pink);
  }

  .btn-lock:hover {
    background: rgba(255,62,127,0.18);
    border-color: var(--pink);
  }

  .btn-lock.locked {
    background: var(--pink);
    border-color: var(--pink);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,62,127,0.45);
    animation: lockPulse 2.4s ease-in-out infinite;
  }

  @keyframes lockPulse {
    0%, 100% { box-shadow: 0 0 20px rgba(255,62,127,0.45); }
    50%       { box-shadow: 0 0 36px rgba(255,62,127,0.8); }
  }

  .event-desc-guest {
    font-size: 1rem;
    color: rgba(240,240,248,0.6);
    font-style: italic;
    margin-top: 10px;
    line-height: 1.6;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ─── COUNTDOWN (guest page pre-event) ─── */
  #countdownSection {
    text-align: center;
    padding: 10px 0 30px;
    display: none;
  }

  .cd-label-top {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .cd-date-str {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    color: #7eb8ff;
    margin-bottom: 22px;
  }

  .countdown-timer {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .cd-unit {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 18px 20px;
    min-width: 80px;
  }

  .cd-num {
    font-family: var(--font-display);
    font-size: 3rem;
    letter-spacing: 0.02em;
    color: var(--accent);
    line-height: 1;
    display: block;
  }

  .cd-unit-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 6px;
    display: block;
  }

  .cd-go-msg {
    font-family: var(--font-display);
    font-size: 2.4rem;
    letter-spacing: 0.06em;
    color: var(--accent);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-bottom: 10px;
  }

  .form-wrap {
    transition: opacity 0.3s;
  }

  /* ─── TRACK SEARCH RESULTS ─── */
  .search-results {
    display: none;
    border: 1px solid var(--border-bright);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    background: var(--surface2);
    overflow: hidden;
    margin-top: -6px;
  }

  .search-results.open { display: block; }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover, .search-result-item:active { background: var(--surface); }

  .search-art {
    width: 46px;
    height: 46px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface);
  }

  .search-art-placeholder {
    width: 46px;
    height: 46px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border-bright);

    align-items: center;
    justify-content: center;

  .search-info { flex: 1; min-width: 0; }

  .search-track {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

    font-size: 0.68rem;

    color: var(--muted);
    white-space: nowrap;

    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .search-genre {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;

    background: var(--accent-dim);
    border: 1px solid rgba(198,255,0,0.2);

    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

    text-align: right;

    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,240,248,0.2);

  }

  /* ─── VIEW REQUESTS BUTTON ─── */
  .btn-view-queue {
    width: 100%;
    margin-top: 10px;
    margin-bottom: 30px;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--font-mono);

    letter-spacing: 0.12em;
    text-transform: uppercase;

    transition: all 0.2s;

  .btn-view-queue:hover { border-color: var(--accent); color: var(--accent); }

  /* ─── QUEUE OVERLAY ─── */
  .queue-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9,11,16,0.97);
    backdrop-filter: blur(8px);
    z-index: 150;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .queue-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .queue-overlay-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 0 24px 30px;
  }

  .queue-overlay-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    margin-bottom: 20px;
  }

  .queue-overlay-title {
    font-family: var(--font-display);
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .queue-overlay-right {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .queue-auto-close {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .queue-close-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border-bright);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .queue-close-btn:hover { border-color: var(--pink); color: var(--pink); }

  .queue-overlay-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .queue-item {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 8px;
    border-radius: var(--radius-sm);
  }

  .queue-item:last-child { border-bottom: none; }

  .queue-item-info { flex: 1; }

  .queue-item-song {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .queue-item-artist {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .queue-item-requester {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(240,240,248,0.3);
    margin-top: 4px;
  }

  .queue-item-actions {
    display: flex;
    gap: 6px;
    margin-left: 12px;
    flex-shrink: 0;
  }

  .queue-item-action {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }

  /* Responsive */
  @media (max-width: 860px) {
    .panel { padding: 0 16px 40px; }
    .header { padding: 16px 0 0; margin-bottom: 24px; }
    .logo { font-size: 1.8rem; }

    .stat-card { padding: 14px 16px; }

    .request { padding: 16px 18px; }
    .queue-item { flex-direction: column; }
    .queue-item-actions { margin-left: 0; margin-top: 10px; }
  }
</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// COPY REQUEST FUNCTION - Fixed Implementation
// ═══════════════════════════════════════════════════════════════════════════
function copyRequest(event) {
  event.stopPropagation();
  
  // Find the parent request card
  const requestCard = event.target.closest('.request');
  if (!requestCard) return;
  
  // Get song name and artist from the card
  const songName = requestCard.querySelector('.song-name')?.textContent?.trim() || '';
  const artistName = requestCard.querySelector('.req-meta')?.textContent?.split('•')[0]?.trim() || '';
  
  // Combine into copy text
  const copyText = `${songName} - ${artistName}`.trim();
  
  if (!copyText) return;
  
  // Copy to clipboard
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(copyText).then(() => {
      // Visual feedback
      const btn = event.target;
      btn.classList.add('copied');
      btn.innerHTML = '✓';
      
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '📋';
      }, 2000);
    }).catch(() => {
      // Fallback for older browsers
      fallbackCopy(copyText, event.target);
    });
  } else {
    fallbackCopy(copyText, event.target);
  }
}

// Fallback copy function for older browsers
function fallbackCopy(text, btn) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  
  try {
    document.execCommand('copy');
    btn.classList.add('copied');
    btn.innerHTML = '✓';
    
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '📋';
    }, 2000);
  } catch (err) {
    console.error('Copy failed:', err);
  }
  
  document.body.removeChild(textarea);
}

// Add event delegation for copy buttons
document.addEventListener('click', function(e) {
  if (e.target.closest('.btn-copy')) {
    copyRequest(e);
  }
});
</script>
